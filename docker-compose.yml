services:
  wine-runner:
    build: .
    working_dir: /programsdir
    environment:
      - DISPLAY=${DISPLAY}
      - WINEPREFIX=/wineprefix
      - WINEDEBUG=-all # Silences heavy debug logging
      - PULSE_SERVER=unix:/tmp/pulse-socket # Audio routing
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro # Made read-only for host safety
      - ./programs:/programsdir
      - ./wine_data:/wineprefix # Persists registry and app data
      - ./entrypoint.sh:/entrypoint.sh:ro
      - /run/user/1000/pulse/native:/tmp/pulse-socket # Mount host audio socket
    shm_size: 1gb
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
