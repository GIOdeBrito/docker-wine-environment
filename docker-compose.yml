services:
  wine-runner:
    build: .
    working_dir: /programsdir
    environment:
      - DISPLAY=${DISPLAY}
      - WINEPREFIX=/home/gameuser
      - WINEDEBUG=-all
      - PULSE_SERVER=unix:/tmp/pulse-socket
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro # Made read-only for host safety
      - ./programs:/programsdir
      - ./home_data:/home/gio
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./commands:/commands
      - /run/user/1000/pulse/native:/tmp/pulse-socket # Mount host audio socket
    shm_size: 1gb
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
